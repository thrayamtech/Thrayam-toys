name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # ---------- CHECKOUT CODE ----------
      - name: Checkout code
        uses: actions/checkout@v4

      # ---------- SETUP NODE ----------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # ---------- BUILD FRONTEND ----------
      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build

      # ---------- CLEAN FRONTEND FOLDER ON EC2 ----------
      - name: Clean frontend build directory on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            rm -rf /home/ec2-user/apps/thrayam-threads/frontend/build
            mkdir -p /home/ec2-user/apps/thrayam-threads/frontend/build

      # ---------- UPLOAD FRONTEND BUILD ----------
      - name: Upload frontend build to EC2
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "frontend/build/."
          target: "/home/ec2-user/apps/thrayam-threads/frontend/build"
          strip_components: 2

      # ---------- SETUP BACKEND REPOSITORY ----------
      - name: Setup Backend Repository
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Create apps directory if it doesn't exist
            mkdir -p /home/ec2-user/apps

            # Clone repository if it doesn't exist, otherwise pull latest
            if [ ! -d "/home/ec2-user/apps/thrayam-threads" ]; then
              echo "Cloning repository for the first time..."
              cd /home/ec2-user/apps
              git clone https://github.com/thrayamtech/thrayam-threads.git
            else
              echo "Pulling latest changes..."
              cd /home/ec2-user/apps/thrayam-threads
              git pull origin main
            fi

            # Install backend dependencies
            cd /home/ec2-user/apps/thrayam-threads/backend
            npm install --production

            # Restart PM2 process
            pm2 restart thrayam-backend || pm2 start server.js --name thrayam-backend
            pm2 save

      # ---------- RELOAD NGINX ----------
      - name: Reload Nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo systemctl reload nginx
